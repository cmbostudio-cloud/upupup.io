<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>UPUPUP.io 스테이지 에디터</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="./editor.css">
</head>
<body class="is-editor-locked">
<div class="editor-app">
  <header class="editor-topbar">
    <div class="editor-brand">
      <span class="editor-kicker">개발자 도구</span>
      <h1>UPUPUP 스테이지 에디터</h1>
      <p>기둥과 별 오브젝트를 배치해서 스테이지 JSON을 만듭니다.</p>
    </div>

    <div class="editor-topbar-actions">
      <a class="editor-button ghost" href="../index.html">게임으로 돌아가기</a>
      <button id="load-sample-btn" class="editor-button" type="button">샘플 불러오기</button>
      <button id="reset-btn" class="editor-button" type="button">초기화</button>
      <button id="save-local-btn" class="editor-button" type="button">로컬 저장</button>
    </div>
  </header>

  <main class="editor-layout">
    <aside class="panel panel-left">
      <section class="panel-section">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">스테이지 정보</span>
            <h2>기본 정보</h2>
          </div>
        </div>

        <div class="field-grid">
          <label class="field">
            <span>이름</span>
            <input id="stage-name-input" type="text" autocomplete="off">
          </label>
          <label class="field">
            <span>스테이지</span>
            <input id="stage-number-input" type="number" min="1" step="1">
          </label>
          <label class="field">
            <span>맵 너비</span>
            <input id="map-width-input" type="number" min="200" step="10">
          </label>
          <label class="field">
            <span>지면 Y</span>
            <input id="ground-y-input" type="number" min="0" step="10">
          </label>
        </div>
      </section>

      <section class="panel-section">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">도구</span>
            <h2>오브젝트 추가</h2>
          </div>
        </div>

        <div class="tool-grid">
          <button id="add-stick-btn" class="tool-button" type="button">
            <strong>기둥</strong>
            <span>기본 발판 오브젝트를 추가합니다.</span>
          </button>
          <button id="add-moving-stick-btn" class="tool-button" type="button">
            <strong>이동 막대기</strong>
            <span>좌우로 움직이는 막대기를 추가합니다.</span>
          </button>
          <button id="add-star-btn" class="tool-button" type="button">
            <strong>별</strong>
            <span>스테이지 완료 오브젝트를 추가합니다.</span>
          </button>
          <button id="add-windmill-btn" class="tool-button" type="button">
            <strong>바람개비</strong>
            <span>회전하는 바람개비를 추가합니다.</span>
          </button>
        </div>
      </section>

      <section class="panel-section panel-fill inspector-card">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">오브젝트</span>
            <h2>목록</h2>
          </div>
          <div class="panel-head-actions">
            <button id="duplicate-btn" class="mini-button" type="button">복제</button>
            <button id="delete-btn" class="mini-button danger" type="button">삭제</button>
          </div>
        </div>
        <div id="object-list" class="object-list" aria-live="polite"></div>
      </section>
    </aside>

    <section class="panel panel-preview">
      <div class="panel-head">
        <div>
          <span class="panel-kicker">캔버스</span>
          <h2>스테이지 미리보기</h2>
        </div>
        <div class="panel-head-actions">
          <button id="export-json-btn" class="mini-button" type="button">JSON 새로고침</button>
          <button id="download-btn" class="mini-button" type="button">다운로드</button>
          <button id="copy-btn" class="mini-button" type="button">복사</button>
        </div>
      </div>

      <div class="canvas-shell">
        <div id="canvas-scroll" class="canvas-scroll">
          <canvas id="stage-canvas"></canvas>
        </div>
      </div>

      <div class="panel-footnote">
        캔버스에서 오브젝트를 드래그하세요. 방향키로 미세 이동할 수 있고, Shift를 누르면 이동 폭이 커집니다.
      </div>
    </section>

    <aside class="panel panel-right">
      <section class="panel-section panel-fill inspector-card inspector-card-json">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">인스펙터</span>
            <h2>선택된 오브젝트</h2>
          </div>
        </div>

        <form id="inspector-form" class="inspector-form">
          <label class="field">
            <span>종류</span>
            <select id="object-type-input">
              <option value="stick">기둥</option>
              <option value="moving-stick">이동 막대기</option>
              <option value="windmill">바람개비</option>
              <option value="star">별</option>
            </select>
          </label>
          <label class="field">
            <span>ID</span>
            <input id="object-id-input" type="text" readonly>
          </label>
          <div class="field-grid compact">
            <label class="field">
              <span>X</span>
              <input id="object-x-input" type="number" step="1">
            </label>
            <label class="field">
              <span>Y</span>
              <input id="object-y-input" type="number" step="1">
            </label>
            <label class="field">
              <span>너비</span>
              <input id="object-width-input" type="number" step="1" min="1">
            </label>
            <label class="field">
              <span>높이</span>
              <input id="object-height-input" type="number" step="1" min="1">
            </label>
          </div>
          <div class="field-grid compact">
            <label class="field">
              <span>속력</span>
              <input id="object-speed-input" type="number" step="0.1" min="0.1">
            </label>
            <label class="field">
              <span>첫 번째 이동 방향</span>
              <select id="object-direction-input">
                <option value="right">오른쪽</option>
                <option value="left">왼쪽</option>
              </select>
            </label>
          </div>
        </form>
      </section>

      <section class="panel-section panel-fill">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">JSON</span>
            <h2>스테이지 데이터</h2>
          </div>
          <div class="panel-head-actions">
            <label class="mini-button file-button">
              파일 불러오기
              <input id="import-file-input" type="file" accept="application/json,.json" hidden>
            </label>
            <button id="apply-json-btn" class="mini-button" type="button">JSON 적용</button>
          </div>
        </div>

        <textarea id="json-output" spellcheck="false"></textarea>
      </section>
    </aside>
  </main>

  <footer class="editor-statusbar">
    <span id="editor-status">준비 완료.</span>
  </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<script src="../js/shared.js"></script>
<script src="../js/auth.js"></script>
<script src="./editor.js"></script>
</body>
</html>
