<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#f5f1e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="UPUPUP.io">
  <title>UPUPUP.io</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <canvas id="game-canvas"></canvas>
  <button id="editor-access-btn" class="editor-access-btn" type="button">[에디터 접근]</button>
  <button id="game-exit-btn" class="game-exit-btn" type="button" hidden aria-label="게임 종료">
    <span class="game-exit-icon" aria-hidden="true">X</span>
    <span class="game-exit-label">종료</span>
  </button>
  <div id="menu-overlay" role="dialog" aria-label="Main menu">
    <div class="menu-tablist" role="tablist" aria-label="Main menu tabs">
      <button id="menu-tab-game" class="menu-tab-button" type="button" role="tab" aria-selected="true"
        aria-controls="menu-panel-game" data-menu-tab="game">
        <span class="menu-tab-kicker" data-i18n="tab.game.kicker">GAME</span>
        <span class="menu-tab-label" data-i18n="tab.game.label">메인</span>
      </button>
      <button id="menu-tab-skin" class="menu-tab-button" type="button" role="tab" aria-selected="false"
        aria-controls="menu-panel-skin" data-menu-tab="skin">
        <span class="menu-tab-kicker" data-i18n="tab.skin.kicker">SKIN</span>
        <span class="menu-tab-label" data-i18n="tab.skin.label">스킨</span>
      </button>
      <button id="menu-tab-shop" class="menu-tab-button" type="button" role="tab" aria-selected="false"
        aria-controls="menu-panel-shop" data-menu-tab="shop">
        <span class="menu-tab-kicker" data-i18n="tab.shop.kicker">SHOP</span>
        <span class="menu-tab-label" data-i18n="tab.shop.label">상점</span>
      </button>
      <button id="menu-tab-settings" class="menu-tab-button" type="button" role="tab" aria-selected="false"
        aria-controls="menu-panel-settings" data-menu-tab="settings">
        <span class="menu-tab-kicker" data-i18n="tab.settings.kicker">SETTINGS</span>
        <span class="menu-tab-label" data-i18n="tab.settings.label">설정</span>
      </button>
    </div>

    <div class="menu-shell">
      <div class="menu-panels">
        <section id="menu-panel-shop" class="menu-panel" role="tabpanel" aria-labelledby="menu-tab-shop"
          data-menu-panel="shop" hidden>
          <div class="menu-panel-inner menu-panel-empty">
            <span class="menu-panel-kicker">SHOP</span>
            <h2 class="menu-panel-title" data-i18n="shop.title">상점</h2>
            <p class="menu-panel-empty-text" data-i18n="comingSoon">준비중...</p>
          </div>
        </section>

        <section id="menu-panel-skin" class="menu-panel" role="tabpanel" aria-labelledby="menu-tab-skin"
          data-menu-panel="skin" hidden>
          <div class="menu-panel-inner menu-panel-skin">
            <span class="menu-panel-kicker">SKIN</span>
            <h2 class="menu-panel-title" data-i18n="skin.title">스킨</h2>
            <div class="skin-subtablist" role="tablist" aria-label="Skin menu tabs">
              <button id="skin-subtab-skins" class="skin-subtab-button" type="button" role="tab"
                aria-selected="true" aria-controls="skin-panel-skins" data-skin-tab="skins" data-i18n="skin.skins">스킨</button>
              <button id="skin-subtab-themes" class="skin-subtab-button" type="button" role="tab"
                aria-selected="false" aria-controls="skin-panel-themes" data-skin-tab="themes" data-i18n="skin.themes">테마</button>
            </div>
            <div id="skin-panel-skins" class="skin-subpanel" role="tabpanel" aria-labelledby="skin-subtab-skins"
              data-skin-panel="skins">
              <p class="menu-panel-empty-text" data-i18n="comingSoon">준비중...</p>
            </div>
            <div id="skin-panel-themes" class="skin-subpanel" role="tabpanel" aria-labelledby="skin-subtab-themes"
              data-skin-panel="themes" hidden>
              <p id="shop-theme-status" class="menu-panel-empty-text" data-i18n="theme.choose">테마를 선택하세요.</p>
              <div id="shop-theme-grid" class="shop-theme-grid" aria-label="Theme selector"></div>
            </div>
          </div>
        </section>

        <section id="menu-panel-game" class="menu-panel is-active" role="tabpanel" aria-labelledby="menu-tab-game"
          data-menu-panel="game">
          <div class="menu-panel-inner menu-panel-main">
            <div class="menu-title" aria-label="UPUPUP.io">
              <span class="menu-title-main">UPUPUP</span><span class="menu-title-io">.io</span>
            </div>
            <p id="menu-credit-balance" class="menu-credit-balance" aria-live="polite">보유 크레딧 0</p>
            <div class="menu-actions">
              <button id="menu-play-btn" class="menu-tile" type="button" aria-label="새 게임 시작" data-variant="play">
                <div class="menu-tile-head">
                  <span class="menu-tile-kicker">START</span>
                  <span class="menu-tile-arrow" aria-hidden="true"></span>
                </div>
                <span class="menu-tile-title">새 게임</span>
                <span class="menu-tile-desc">처음부터 다시 시작합니다. 기록이 없다면 이 버튼으로 플레이를 시작하세요.</span>
              </button>
              <button id="menu-continue-btn" class="menu-tile" type="button" aria-label="저장된 게임 이어하기"
                data-variant="continue">
                <div class="menu-tile-head">
                  <span class="menu-tile-kicker">CONTINUE</span>
                  <span class="menu-tile-arrow" aria-hidden="true"></span>
                </div>
                <span class="menu-tile-title">이어하기</span>
                <span class="menu-tile-desc">마지막 저장 지점에서 계속합니다.</span>
              </button>
            </div>
            <p id="menu-continue-note" class="menu-note">저장된 진행이 있으면 이어하기 버튼이 활성화됩니다.</p>
          </div>
        </section>

        <section id="menu-panel-settings" class="menu-panel" role="tabpanel" aria-labelledby="menu-tab-settings"
          data-menu-panel="settings" hidden>
          <div class="menu-panel-inner menu-panel-settings">
            <span class="menu-panel-kicker">SETTINGS</span>
            <h2 class="menu-panel-title" data-i18n="settings.title">설정</h2>
            <div id="settings-panel" class="menu-settings-grid">
              <button id="grid-toggle-btn" class="panel-button secondary" type="button">
                <span class="panel-button-title">격자</span>
                <span class="panel-button-desc">맵의 격자선을 켜고 끕니다. 화면 구성을 확인하기 좋습니다.</span>
              </button>
              <label id="language-control" class="language-control panel-button secondary" for="language-select">
                <span id="language-label" class="panel-button-title">언어</span>
                <span id="language-desc" class="panel-button-desc">메뉴와 상태 메시지에 사용할 언어를 선택합니다.</span>
                <select id="language-select" class="language-select" aria-labelledby="language-label" aria-describedby="language-desc">
                  <option value="ko">한국어</option>
                  <option value="en">English</option>
                </select>
              </label>
              <div id="guest-cloud-controls" class="guest-cloud-controls" hidden>
                <span class="panel-button-title" data-i18n="guestCloud.title">게스트 클라우드 저장</span>
                <span class="panel-button-desc" data-i18n="guestCloud.desc">게스트 진행상황을 파일로 내보내거나 이전에 내보낸 파일에서 불러옵니다.</span>
                <div class="guest-cloud-actions">
                  <button id="guest-export-btn" class="panel-button secondary" type="button" data-i18n="guestCloud.export">내보내기</button>
                  <button id="guest-import-btn" class="panel-button secondary" type="button" data-i18n="guestCloud.import">불러오기</button>
                  <input id="guest-import-file" type="file" accept="application/json,.json" hidden>
                </div>
              </div>
              <button id="menu-logout-btn" class="panel-button secondary settings-logout-btn" type="button">
                <span class="panel-button-title" data-i18n="logout.title">로그아웃</span>
                <span class="panel-button-desc" data-i18n="logout.desc">현재 계정에서 로그아웃하고 로그인 화면으로 돌아갑니다.</span>
              </button>
            </div>
            <div class="menu-audio-control" role="group" aria-label="Sound volume">
              <span class="panel-button-title" data-i18n="sound.title">SOUND</span>
              <div class="menu-audio-slider-row">
                <input id="audio-volume-slider" class="menu-audio-slider" type="range" min="0" max="100" step="1"
                  value="80" aria-label="Sound volume">
                <span id="audio-volume-value" class="menu-audio-value">80%</span>
              </div>
              <span class="panel-button-desc" data-i18n="sound.desc">Adjust the overall game sound volume.</span>
            </div>
            <p id="save-status" class="menu-note" aria-live="polite"></p>
          </div>
        </section>
      </div>
    </div>
  </div>
  <script src="./js/logic.js"></script>
  <script src="./js/map.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/i18n.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/runtime.js"></script>
  <script src="./js/game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>

</html>
